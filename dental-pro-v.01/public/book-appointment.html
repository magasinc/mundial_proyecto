<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="stylesheet" href="build/tailwind.css">
  <title>Book Appointment | DentalPro</title>
</head>

<body class="antialiased bg-white font-sans text-gray-900">
  <main class="w-full">
    <header class="relative bg-blue-600 px-4 sm:px-8 lg:px-16 xl:px-40 2xl:px-64">
      <div class="flex flex-wrap items-center justify-between py-6">
        <div class="w-1/2 md:w-auto">
          <a href="index.html" class="text-white font-bold text-2xl">DentalPro</a>
        </div>
        <nav class="hidden md:block">
          <ul class="flex items-center text-white">
            <li><a href="index.html" class="px-3 py-2 font-semibold">Home</a></li>
            <li><a href="index.html#about" class="px-3 py-2 font-semibold">About</a></li>
            <li><a href="index.html#contact" class="px-3 py-2 font-semibold">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="px-4 py-16 sm:px-8 lg:px-16 xl:px-40 2xl:px-64">
      <div class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-12">
        <div>
          <p class="text-sm uppercase tracking-wide text-teal-600 font-semibold">Appointment</p>
          <h1 class="text-4xl font-bold mt-3">Book Your Visit</h1>
          <p class="mt-4 text-gray-600">Fill out the form and our team will contact you to confirm your appointment.</p>
          <div class="mt-8 rounded-lg border border-gray-200 p-6">
            <h2 class="font-semibold text-xl">Clinic Hours</h2>
            <ul class="mt-4 space-y-2 text-gray-600">
              <li>Mon - Fri: 9:00 AM - 7:00 PM</li>
              <li>Saturday: 10:00 AM - 3:00 PM</li>
              <li>Sunday: Closed</li>
            </ul>
          </div>
        </div>

        <div class="bg-gray-50 rounded-xl p-8 shadow-sm border border-gray-100">
          <form class="space-y-5">
            <div class="grid md:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-semibold mb-1">First Name</label>
                <input type="text" class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-teal-500" placeholder="John">
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">Last Name</label>
                <input type="text" class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-teal-500" placeholder="Doe">
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Email</label>
              <input type="email" class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-teal-500" placeholder="you@example.com">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Phone</label>
              <input type="tel" class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-teal-500" placeholder="(562) 789-1935">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Preferred Date</label>
              <input type="date" class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-teal-500">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Service</label>
              <select class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-teal-500">
                <option>General Dentistry</option>
                <option>Cosmetic Dentistry</option>
                <option>Oral Surgery</option>
                <option>Teeth Whitening</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Message</label>
              <textarea rows="5" class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-teal-500" placeholder="Tell us about your needs"></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-semibold px-6 py-3 rounded hover:bg-blue-500">Submit Request</button>
          </form>
        </div>
      </div>
    </section>

    <footer class="relative bg-gray-900 text-white px-4 sm:px-8 lg:px-16 xl:px-40 2xl:px-64 py-12">
      <div class="text-center text-gray-400 text-sm">
        © 2026 DentalPro. All rights reserved.
      </div>
    </footer>
  </main>
</body>

</html>
